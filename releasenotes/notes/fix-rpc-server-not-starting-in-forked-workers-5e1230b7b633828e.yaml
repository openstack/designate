---
fixes:
  - |
    Fixed ``designate-central``, ``designate-worker``, and
    ``designate-producer`` starting their RPC server before forking their
    worker processes. This left every worker process beyond the first
    without a working RPC listener, so only one process actually handled
    RPC traffic regardless of the configured ``workers`` count, and each
    worker hung for up to 60 seconds (then required a forceful kill) on
    shutdown while waiting on a listener that was never started.
